<html lang="ja" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>oohi Writing Tool</title>
  <meta name="author" content="大野ヒロアキ">
  <meta name="copyright" content="Copyright (c) 2024-2026 大野ヒロアキ All Rights Reserved.">
  <meta name="description" content="記事URLを入力するとSEO・CVR・ペルソナなどを診断する大野ヒロアキ開発のWebツール">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a class="logo" href="#">oohi <span class="logo-accent">Writing Tool</span></a>
      <div class="header-actions">
        <button id="historyToggle" class="btn-ghost" title="診断履歴">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="10"/></svg>
        </button>
        <button id="themeToggle" class="btn-ghost" title="テーマ切替">
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <section class="hero">
    <div class="hero-inner">
      <p class="hero-label">Article Analyzer</p>
      <h2 class="hero-title">記事のSEO・CVRを瞬時に診断</h2>
      <div class="url-form">
        <div class="url-input-wrap">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          <input type="url" id="urlInput" placeholder="記事URLを入力してください" autocomplete="url">
        </div>
        <button id="fetchBtn" class="btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          分析する
        </button>
      </div>
    </div>
  </section>

  <div id="loading" class="loading hidden">
    <div class="spinner"></div>
    <p>記事を読み込み・分析中...</p>
  </div>

  <main id="mainContent" class="main hidden">
    <aside class="panel-left" id="panelLeft"></aside>
    <section class="panel-right" id="panelRight">
      <div class="article-meta" id="articleMeta"></div>
      <div class="article-body" id="articleBody"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p>開発者：<strong>大野ヒロアキ</strong> &copy; 2024-2026 All Rights Reserved.</p>
  </footer>

  <div id="historyModal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2>診断履歴</h2>
        <button id="historyClose" class="btn-ghost">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal-body" id="historyList"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="assets/js/security.js"></script>
  <script src="utils/textAnalyzer.js"></script>
  <script src="utils/scoreCalculator.js"></script>
  <script src="components/scoreCard.js"></script>
  <script src="components/personaCard.js"></script>
  <script src="components/keywordList.js"></script>
  <script src="assets/js/articleLoader.js"></script>
  <script src="assets/js/analyzer.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
